{% load static %}
<section class="galeria" style="margin-left: 5em">
    <form action="{% url 'cadastro' %}" method="post">
        {% csrf_token %}
        <div class="row">
            {% for field in form.visible_fields %}
            <div class="col-12 col-lg-12" style="margin-bottom: 10px">
                <label for="{{ field.id_for_label }}" style="color: #d9d9d9; margin-bottom: 5px;">{{ field.label }}</label>
                {{ field }}
            </div>
            {% for error in field.errors %}
            <div class="alert alert-danger">
                {{error}}
            </div>
            {% endfor %}
            {% endfor %}
        </div>
        <div class="social-media">
            <div class="social-media-details">
                <a href="http://127.0.0.1:8000/accounts/github/login/?process=login">
                    <img src="{% static 'assets/imagens/github.svg' %}" alt="Ícone para realizar a Autenticação com GitHub" class="social-media-icon">
                    <p>GitHub</p>
                </a>
            </div>
        </div>
        <div>
            <button class="btn btn-success col-12" style="padding: top 5px;" type="submit" type="submit">Cadastrar</button>
        </div>
    </form>
</section>
